<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1F4D3A" />

    <!-- SSR-META-START
         Marketing routes (/en/*, /ar/*) have this block REPLACED by the
         Express SPA fallback in server/src/index.js with route-specific
         <title>, description, canonical, hreflang alternates, OG/Twitter
         tags, and JSON-LD before the page ships. The tags below are only
         served for non-marketing paths (auth, dashboard) that won't be
         indexed anyway. Keep this block minimal so no duplicate tags
         leak onto marketing pages on the way through. -->
    <title>Daris</title>
    <meta name="description" content="Daris. Online Quran, Arabic & Fiqh lessons." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Daris" />
    <meta property="og:title" content="Daris" />
    <meta property="og:image" content="https://daris.education/images/daris-og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- SSR-META-END -->

    <link rel="icon" type="image/png" href="/images/daris-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-cream text-slate-900">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
